services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: wavematch
      POSTGRES_PASSWORD: wavematch
      POSTGRES_DB: wavematch
    ports: ["5432:5432"]
  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://wavematch:wavematch@postgres:5432/wavematch
      SECRET_KEY: changeme
    volumes: ["./backend:/app"]
    ports: ["8000:8000"]
    depends_on: [postgres]
  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes: ["./frontend:/app"]
    ports: ["3000:3000"]
    depends_on: [backend]
