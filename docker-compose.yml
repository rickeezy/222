services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: campus
      POSTGRES_PASSWORD: campus
      POSTGRES_DB: campus_game
    ports: ["5432:5432"]
    volumes: ["pg_data:/var/lib/postgresql/data"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  backend:
    build: ./backend
    environment:
      PORT: 8000
      DATABASE_URL: postgresql://campus:campus@postgres:5432/campus_game
      REDIS_URL: redis://redis:6379
      JWT_SECRET: super-secret
      FRONTEND_URL: http://localhost:3000
      STUDENT_EMAIL_DOMAIN: howard.edu
    ports: ["8000:8000"]
    depends_on: [postgres, redis]

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports: ["3000:3000"]
    depends_on: [backend]

volumes:
  pg_data:
